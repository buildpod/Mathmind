<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MathMind — Show me you understand, any way you can</title>
<meta name="description" content="Free evidence-based math practice for every learner. General mode for all kids. Focus mode designed for autism. No writing required.">
<meta property="og:title" content="MathMind — Free Math for Every Learner">
<meta property="og:description" content="Interactive + printable math practice. Autism-optimized Focus mode with writing-free input. 100% free.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#fafafa;-webkit-tap-highlight-color:transparent;user-select:none}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-4px)}50%{transform:translateX(4px)}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(37,99,235,.2)}50%{box-shadow:0 0 18px rgba(37,99,235,.5)}}
.fi{animation:fadeIn .35s ease-out}.pi{animation:pop .3s ease-out}.sk{animation:shake .35s ease}.gl{animation:glow 1.5s ease-in-out infinite}
.b{border:none;border-radius:12px;font-weight:700;transition:all .12s ease}.b:active{transform:scale(.95)}
@media print{.np{display:none!important}body{background:#fff!important}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}
@page{margin:6mm;size:A4}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ─── CONSTANTS ───
const A="#2563eb",G="#059669",TX="#1e293b",MU="#94a3b8",BG="#fafafa",WH="#fff",ERR="#dc2626",OK="#16a34a";
const TOPICS=[
{k:"addition",l:"Addition",c:G},{k:"subtraction",l:"Subtraction",c:"#7c3aed"},
{k:"comparison",l:"Compare",c:A},{k:"patterns",l:"Patterns",c:"#d97706"},
{k:"multiplication",l:"Multiply",c:"#dc2626"},{k:"placeValue",l:"Place Value",c:"#0891b2"},
{k:"missingNumber",l:"Missing Number",c:"#be185d"},{k:"oddEven",l:"Odd / Even",c:"#4f46e5"}];
const DIFFS=[{k:"easy",l:"1 – 20",mx:20},{k:"medium",l:"1 – 50",mx:50},{k:"hard",l:"1 – 100",mx:100}];
const LAYOUTS=[{k:"standard",l:"Standard",bx:40,fs:20,gp:10,pp:12},{k:"large",l:"Large Boxes",bx:56,fs:24,gp:14,pp:8},{k:"spacious",l:"Extra Spacious",bx:68,fs:28,gp:20,pp:6}];
const INPUTS=[{k:"numpad",l:"Number Pad",d:"Tap big buttons"},{k:"cards",l:"Pick Answer",d:"Tap the right card"},{k:"voice",l:"Voice",d:"Say it out loud"},{k:"tapcount",l:"Tap to Count",d:"Count by tapping"}];

function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function P(a){return a[R(0,a.length-1)]}
function S(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=R(0,i);[b[i],b[j]]=[b[j],b[i]]}return b}
function C(a,n){const r=[];for(let i=0;i<a.length;i+=n)r.push(a.slice(i,i+n));return r}

// ─── PROBLEM GENERATOR ───
function gen(tk,dk,cnt){
  const mx=DIFFS.find(d=>d.k===dk).mx;const o=[];
  for(let i=0;i<cnt;i++){
    if(tk==="addition"){const a=R(1,mx-1),b=R(1,Math.max(1,mx-a)),ans=a+b;
      o.push({k:"eq",a,b,op:"+",t:a+" + "+b,ans,as:""+ans,dc:a>=5&&b>=3&&ans<=20?a+"+"+(10-a)+"=10, 10+"+(b-(10-a))+"="+ans:null,ch:mkCh(ans)})}
    else if(tk==="subtraction"){const a=R(2,mx),b=R(1,a-1),ans=a-b;
      o.push({k:"eq",a,b,op:"-",t:a+" − "+b,ans,as:""+ans,ch:mkCh(ans)})}
    else if(tk==="comparison"){const a=R(0,mx),b=Math.random()<.25?a:R(0,mx);
      o.push({k:"cmp",a,b,t:a+"  ?  "+b,ans:a>b?">":a<b?"<":"=",as:a>b?">":a<b?"<":"=",ch:[">","<","="]})}
    else if(tk==="patterns"){const st=R(2,dk==="easy"?5:10),s=R(0,10);const sq=[];for(let j=0;j<8;j++)sq.push(s+j*st);
      const h={};while(Object.keys(h).length<3)h[R(3,7)]=1;const ds=sq.map((v,j)=>h[j]?null:v);const an=[];sq.forEach((v,j)=>{if(h[j])an.push(v)});
      o.push({k:"pat",t:"Pattern: +"+st,display:ds,ans:an,as:an.join(", "),sq,rule:"+"+st})}
    else if(tk==="multiplication"){const a=R(1,dk==="easy"?5:10),b=R(1,dk==="easy"?5:10),ans=a*b;
      o.push({k:"eq",a,b,op:"×",t:a+" × "+b,ans,as:""+ans,ch:mkCh(ans)})}
    else if(tk==="placeValue"){const n=R(11,mx),t=Math.floor(n/10),oo=n%10;
      o.push({k:"pv",num:n,t:""+n,ans:t,as:t+" tens "+oo+" ones",tens:t,ones:oo,ch:mkCh(t)})}
    else if(tk==="missingNumber"){const tot=R(5,mx),pt=R(1,tot-1),ot=tot-pt;
      if(Math.random()>.5)o.push({k:"eq",t:"__ + "+pt+" = "+tot,ans:ot,as:""+ot,ch:mkCh(ot)});
      else o.push({k:"eq",t:tot+" − __ = "+ot,ans:pt,as:""+pt,ch:mkCh(pt)})}
    else if(tk==="oddEven"){const n=R(1,mx);
      o.push({k:"oe",num:n,t:""+n,ans:n%2===0?"Even":"Odd",as:n%2===0?"Even":"Odd",ch:["Odd","Even"]})}
  }return o;
}
function mkCh(ans){const w=new Set();while(w.size<3){const v=ans+R(-5,5);if(v!==ans&&v>=0)w.add(v)}return S([ans,...w].map(String))}

function snd(type,vol){if(vol==="off")return;try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();g.gain.value=vol==="subtle"?.05:.1;o.connect(g);g.connect(c.destination);if(type==="ok"){o.frequency.value=523;o.type="sine";o.start();o.frequency.setValueAtTime(659,c.currentTime+.1);o.frequency.setValueAtTime(784,c.currentTime+.2);o.stop(c.currentTime+.3)}else if(type==="no"){o.frequency.value=200;o.type="triangle";o.start();o.stop(c.currentTime+.15)}else{o.frequency.value=440;o.type="sine";o.start();o.stop(c.currentTime+.04)}}catch(e){}}

// ─── NUMBER PAD ───
function NumPad({onSubmit,clr}){
  const[v,setV]=useState("");
  return(<div className="fi" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{width:180,height:60,borderRadius:12,border:"2px solid "+clr,background:WH,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:800,color:TX,letterSpacing:3}}>{v||<span style={{color:"#ddd"}}>?</span>}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
      {[1,2,3,4,5,6,7,8,9].map(n=><button key={n} onClick={()=>{setV(x=>x.length<4?x+n:x);snd("t","subtle")}} style={{width:70,height:70,borderRadius:14,border:"1.5px solid #e5e7eb",background:WH,fontSize:26,fontWeight:800,color:TX}}>{n}</button>)}
      <button onClick={()=>setV(x=>x.slice(0,-1))} style={{width:70,height:70,borderRadius:14,border:"1.5px solid #e5e7eb",background:WH,fontSize:20,color:ERR,fontWeight:700}}>⌫</button>
      <button onClick={()=>{setV(x=>x.length<4?x+"0":x);snd("t","subtle")}} style={{width:70,height:70,borderRadius:14,border:"1.5px solid #e5e7eb",background:WH,fontSize:26,fontWeight:800,color:TX}}>0</button>
      <button onClick={()=>{if(v){onSubmit(v);setV("")}}} style={{width:70,height:70,borderRadius:14,border:"none",background:clr,color:WH,fontSize:24,fontWeight:800}}>✓</button>
    </div>
  </div>);
}

// ─── CHOICE CARDS ───
function Cards({choices,onSubmit,clr,focus}){
  const[sel,setSel]=useState(null);const[res,setRes]=useState(null);
  function tap(c){if(sel!==null)return;setSel(c);onSubmit(String(c),function(ok){setRes(ok?"ok":"no");setTimeout(()=>{setSel(null);setRes(null)},ok?500:700)})}
  return(<div className="fi" style={{display:"flex",flexWrap:"wrap",gap:focus?14:10,justifyContent:"center"}}>
    {(choices||[]).map((c,i)=>{const on=sel===c;return <button key={i} className={on?(res==="ok"?"pi":res==="no"?"sk":""):""} onClick={()=>tap(c)} style={{
      minWidth:focus?80:68,height:focus?72:64,borderRadius:14,
      border:on?(res==="ok"?"2.5px solid "+OK:res==="no"?"2.5px solid "+ERR:"2.5px solid "+clr):"2px solid #e5e7eb",
      background:on?(res==="ok"?"#f0fdf4":res==="no"?"#fef2f2":WH):WH,
      fontSize:c.length>2?20:26,fontWeight:800,color:TX,padding:"0 20px",transition:"all .15s"
    }}>{c}</button>})}
  </div>);
}

// ─── VOICE ───
function Voice({onSubmit,clr}){
  const[on,setOn]=useState(false);const[txt,setTxt]=useState("");
  const sup='webkitSpeechRecognition' in window||'SpeechRecognition' in window;
  function start(){if(!sup)return;const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.continuous=false;r.interimResults=false;r.lang='en-US';
    r.onresult=function(e){const t=e.results[0][0].transcript.trim();setTxt(t);setOn(false);const n=t.replace(/[^0-9]/g,'');const lo=t.toLowerCase();
      if(lo.includes("odd"))onSubmit("Odd");else if(lo.includes("even"))onSubmit("Even");
      else if(lo.includes("greater")||t.includes(">"))onSubmit(">");else if(lo.includes("less")||t.includes("<"))onSubmit("<");
      else if(lo.includes("equal")||lo.includes("same"))onSubmit("=");else if(n)onSubmit(n)};
    r.onerror=()=>setOn(false);r.onend=()=>setOn(false);r.start();setOn(true);setTxt("")}
  if(!sup)return<div style={{textAlign:"center",color:MU,fontSize:13,padding:20}}>Voice not supported. Try Chrome.</div>;
  return(<div className="fi" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
    <button className={on?"gl":""} onClick={start} style={{width:96,height:96,borderRadius:"50%",background:on?ERR:clr,color:WH,fontSize:36,border:"none",boxShadow:"0 4px 16px "+(on?"rgba(220,38,38,.3)":clr+"33")}}>🎤</button>
    <div style={{fontSize:13,fontWeight:700,color:on?ERR:MU}}>{on?"Listening...":"Tap to speak"}</div>
    {txt&&<div style={{background:"#f3f4f6",borderRadius:10,padding:"6px 14px",fontSize:14,fontWeight:600,color:TX}}>"{txt}"</div>}
  </div>);
}

// ─── TAP COUNT ───
function TapCnt({problem,onSubmit,clr}){
  const sf=problem.k==="eq"&&problem.op==="+"?problem.a:0;
  const tgt=problem.ans;const[cnt,setCnt]=useState(sf);const[dn,setDn]=useState(false);
  useEffect(()=>{setCnt(sf);setDn(false)},[problem]);
  function tap(){if(dn)return;const n=cnt+1;setCnt(n);snd("t","subtle");if(n===tgt){setDn(true);setTimeout(()=>onSubmit(String(tgt)),500)}}
  return(<div className="fi" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
    <div style={{fontSize:52,fontWeight:900,color:dn?OK:clr}}>{cnt}</div>
    <div style={{fontSize:12,color:MU,fontWeight:600}}>Tap to count{problem.op==="+"?" from "+problem.a:""}</div>
    <button onClick={tap} disabled={dn} style={{width:110,height:110,borderRadius:"50%",background:dn?OK:clr,color:WH,fontSize:30,fontWeight:800,border:"none",opacity:dn?.6:1,boxShadow:"0 4px 16px "+clr+"33"}}>
      {dn?"✓":"👆"}
    </button>
    {!dn&&cnt>sf&&<button className="b" onClick={()=>onSubmit(String(cnt))} style={{background:"#6b7280",color:WH,padding:"8px 20px",fontSize:12}}>Submit {cnt}</button>}
  </div>);
}

// ─── DOT MANIPULATIVE ───
function Dots({problem,clr}){
  const a=problem.a||0,b=problem.b||0,total=problem.ans;
  const[tp,setTp]=useState({});const[cnt,setCnt]=useState(0);
  useEffect(()=>{setTp({});setCnt(0)},[problem]);
  if(total>24||problem.op!=="+")return null;
  function tap(id){if(tp[id])return;setTp(p=>({...p,[id]:1}));setCnt(c=>c+1);snd("t","subtle")}
  const dn=cnt>=total;
  return(<div className="fi" style={{background:WH,borderRadius:12,padding:14,border:"1px solid #f1f5f9",marginBottom:14}}>
    <div style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>Tap dots to count: {cnt} / {total}</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
      {Array.from({length:a}).map((_,i)=><div key={"a"+i} onClick={()=>tap("a"+i)} className={tp["a"+i]?"pi":""} style={{width:30,height:30,borderRadius:"50%",background:tp["a"+i]?"#e5e7eb":clr,cursor:"pointer",transition:"all .15s"}}/>)}
      {Array.from({length:b}).map((_,i)=><div key={"b"+i} onClick={()=>tap("b"+i)} className={tp["b"+i]?"pi":""} style={{width:30,height:30,borderRadius:"50%",background:tp["b"+i]?"#e5e7eb":"#f59e0b",cursor:"pointer",transition:"all .15s"}}/>)}
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:8,fontSize:11,color:MU}}>
      <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:clr,marginRight:3,verticalAlign:"middle"}}></span>{a}</span>
      <span>+</span>
      <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#f59e0b",marginRight:3,verticalAlign:"middle"}}></span>{b}</span>
      <span>=</span>
      <span style={{fontWeight:800,color:dn?OK:MU}}>{dn?total:"?"}</span>
    </div>
  </div>);
}

// ─── TRACING ───
function Tracing({clr,onDone}){
  const ref=useRef();const[cur,setCur]=useState(0);const[dr,setDr]=useState(false);
  useEffect(()=>{draw()},[cur]);
  function draw(){const c=ref.current;if(!c)return;const x=c.getContext("2d");x.clearRect(0,0,c.width,c.height);x.font="bold 160px Nunito";x.textAlign="center";x.textBaseline="middle";x.strokeStyle="#e5e7eb";x.lineWidth=3;x.setLineDash([6,6]);x.strokeText(""+cur,c.width/2,c.height/2);x.setLineDash([])}
  function gp(e){const c=ref.current,r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function sd(e){e.preventDefault();setDr(true);const x=ref.current.getContext("2d"),p=gp(e);x.beginPath();x.moveTo(p.x,p.y);x.strokeStyle=clr;x.lineWidth=5;x.lineCap="round";x.setLineDash([])}
  function mv(e){if(!dr)return;e.preventDefault();const x=ref.current.getContext("2d"),p=gp(e);x.lineTo(p.x,p.y);x.stroke()}
  function ed(){setDr(false)}
  function nx(){if(cur<9)setCur(c=>c+1);else onDone&&onDone()}
  return(<div className="fi" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:20}}>
    <div style={{fontSize:14,fontWeight:700,color:MU}}>Trace: <span style={{color:clr,fontSize:22}}>{cur}</span></div>
    <div style={{display:"flex",gap:3,marginBottom:4}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{width:i===cur?14:8,height:i===cur?14:8,borderRadius:"50%",background:i<cur?clr:i===cur?"#fbbf24":"#e5e7eb",transition:"all .3s"}}/>)}</div>
    <canvas ref={ref} width={260} height={260} style={{borderRadius:14,border:"1.5px solid #e5e7eb",background:WH,touchAction:"none"}}
      onMouseDown={sd} onMouseMove={mv} onMouseUp={ed} onMouseLeave={ed} onTouchStart={sd} onTouchMove={mv} onTouchEnd={ed}/>
    <div style={{display:"flex",gap:8}}>
      <button className="b" onClick={draw} style={{background:"#f3f4f6",color:TX,padding:"10px 20px",fontSize:13}}>Clear</button>
      <button className="b" onClick={nx} style={{background:clr,color:WH,padding:"10px 24px",fontSize:13}}>{cur<9?"Next →":"Done ✓"}</button>
    </div>
  </div>);
}

// ─── PROGRESS BAR ───
function PB({cur,total,clr}){
  const p=Math.round((cur/total)*100);
  return(<div style={{marginBottom:16}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,color:MU,marginBottom:3}}><span>{cur+1} of {total}</span><span>{p}%</span></div>
    <div style={{height:4,borderRadius:2,background:"#f1f5f9",overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:clr,width:p+"%",transition:"width .4s"}}></div></div>
    <div style={{display:"flex",gap:3,marginTop:5,justifyContent:"center",flexWrap:"wrap"}}>{Array.from({length:total}).map((_,i)=><div key={i} style={{width:i===cur?12:7,height:i===cur?12:7,borderRadius:"50%",background:i<cur?clr:i===cur?"#fbbf24":"#e5e7eb",transition:"all .3s"}}/>)}</div>
  </div>);
}

// ─── WORKSHEET BUILDER ───
function bldWS(probs,T,D,L,name){
  const c=T.c,f=L.fs,b=L.bx,g=L.gp;const pgs=C(probs,L.pp);let h="";
  pgs.forEach((pg,pi)=>{if(pi>0)h+='<div style="page-break-before:always"></div>';h+='<div style="padding:10mm 8mm;">';
  h+='<div style="background:'+c+';border-radius:10px;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="color:#fff;font-weight:800;font-size:20px;">'+T.l+'</span><span style="color:rgba(255,255,255,.8);font-size:12px;">Page '+(pi+1)+'/'+pgs.length+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:6px 2px 10px;border-bottom:2px solid #e5e7eb;margin-bottom:'+g+'px;font-size:12px;color:#94a3b8;"><span>'+D.l+'</span><span>Name: '+(name||'___________________')+' Date: ___________</span></div>';
  pg.forEach((p,idx)=>{const n=pi*L.pp+idx+1,bg=n%2?"#f0fdf4":"#eff6ff",ab='<div style="width:'+b+'px;height:'+b+'px;border-radius:8px;border:2.5px solid '+c+';background:#fefce8;display:inline-block;"></div>';
    h+='<div style="background:'+bg+';border-radius:10px;padding:'+g+'px '+(g+6)+'px;display:flex;align-items:center;gap:14px;min-height:'+(b+14)+'px;margin-bottom:'+(g-2)+'px;">';
    h+='<span style="background:'+c+';color:#fff;border-radius:8px;font-weight:800;font-size:13px;min-width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;">'+n+'</span>';
    if(p.k==="eq"||p.k==="pv")h+='<span style="font-size:'+f+'px;font-weight:700;margin-right:14px;">'+p.t+' =</span>'+ab;
    else if(p.k==="cmp")h+='<span style="font-size:'+f+'px;font-weight:700;min-width:48px;text-align:right;margin-right:12px;">'+p.a+'</span>'+ab+'<span style="font-size:'+f+'px;font-weight:700;margin-left:12px;">'+p.b+'</span>';
    else if(p.k==="oe")h+='<span style="font-size:'+f+'px;font-weight:700;margin-right:10px;">'+p.num+'</span><div style="padding:6px 16px;border-radius:8px;border:2.5px solid #059669;font-weight:700;color:#059669;display:inline-block;margin-right:8px;">ODD</div><div style="padding:6px 16px;border-radius:8px;border:2.5px solid #2563eb;font-weight:700;color:#2563eb;display:inline-block;">EVEN</div>';
    else if(p.k==="pat"){h+='<span style="font-size:12px;color:#94a3b8;font-weight:700;margin-right:8px;">'+p.rule+'</span>';p.display.forEach(v=>{h+='<div style="width:'+(b-8)+'px;height:'+(b-12)+'px;border-radius:6px;border:'+(v===null?'2.5px solid '+c:'1.5px solid #d1d5db')+';background:'+(v===null?'#fefce8':'#fff')+';display:inline-flex;align-items:center;justify-content:center;font-size:'+(f-6)+'px;font-weight:700;margin:2px;">'+(v!==null?v:'')+'</div>'});}
    h+='</div>'});
  if(pi===pgs.length-1)h+='<div style="margin-top:12px;text-align:center;padding:10px;background:#f0fdf4;border-radius:8px;color:'+c+';font-weight:800;font-size:14px;">Great work!</div>';h+='</div>'});
  return'<!DOCTYPE html><html><head><meta charset="utf-8"><title>MathMind Worksheet</title><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}body{font-family:Nunito,sans-serif}@page{margin:4mm;size:A4}@media print{.tb{display:none!important}}</style></head><body><div class="tb" style="background:#f0fdf4;padding:12px 20px;text-align:center;border-bottom:2px solid #d1fae5"><b style="color:#059669">MathMind</b> <button onclick="window.print()" style="background:#059669;color:#fff;border:none;border-radius:8px;padding:8px 24px;font-weight:700;cursor:pointer;font-size:14px;margin-left:10px">Print / Save as PDF</button></div>'+h+'</body></html>';}

          {p.k==="cmp"&&<><span style={{fontSize:lo.fs,fontWeight:700,minWidth:40,textAlign:"right"}}>{p.a}</span><AB s={lo.bx}/><span style={{fontSize:lo.fs,fontWeight:700}}>{p.b}</span></>}
          {p.k==="oe"&&<><span style={{fontSize:lo.fs,fontWeight:700,marginRight:8}}>{p.num}</span><span style={{padding:"4px 14px",borderRadius:8,border:"2px solid #059669",fontWeight:700,color:"#059669",fontSize:lo.fs-6}}>ODD</span><span style={{padding:"4px 14px",borderRadius:8,border:"2px solid #2563eb",fontWeight:700,color:"#2563eb",fontSize:lo.fs-6,marginLeft:6}}>EVEN</span></>}

}

        {/* Problem */}
        <div className={st==="ok"?"pi":st==="no"?"sk":"fi"} style={{
          background:WH,borderRadius:focus?12:14,padding:focus?"20px 24px":"18px 22px",
          border:st==="ok"?"2px solid "+OK:st==="no"?"2px solid "+ERR:"2px solid #f1f5f9",
          transition:"border .2s",marginBottom:focus?20:16,textAlign:focus?"center":"left"
        }}>
          {/* Context label */}
          {p.k==="oe"&&<div style={{fontSize:12,color:MU,fontWeight:600,marginBottom:6}}>Odd or Even?</div>}
          {p.k==="cmp"&&<div style={{fontSize:12,color:MU,fontWeight:600,marginBottom:6}}>Which symbol fits?</div>}
          {p.k==="pat"&&<div style={{fontSize:12,color:MU,fontWeight:600,marginBottom:6}}>{p.rule}</div>}
          {p.k==="pv"&&<div style={{fontSize:12,color:MU,fontWeight:600,marginBottom:6}}>How many tens?</div>}

          {/* The problem */}
          <div style={{fontSize:focus?42:36,fontWeight:900,color:TX,letterSpacing:1}}>
            {p.k==="pat"
              ?<div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>{p.display.map((v,i)=><span key={i} style={{display:"inline-block",minWidth:focus?36:30,textAlign:"center",borderBottom:v===null?"2.5px solid "+clr:"none",color:v===null?MU:TX,fontSize:focus?28:24,fontWeight:800}}>{v!==null?v:"?"}</span>)}</div>
              :p.k==="cmp"?<>{p.a} <span style={{color:MU,fontSize:28}}>?</span> {p.b}</>
              :p.k==="oe"||p.k==="pv"?p.t
              :p.t}
          </div>

          {/* Feedback */}
          {st==="ok"&&<div style={{marginTop:8,fontSize:14,fontWeight:700,color:OK}}>Correct</div>}
          {st==="no"&&<div style={{marginTop:8,fontSize:14,fontWeight:700,color:ERR}}>Try again</div>}
        </div>

        {/* Input */}
        {!st&&(
          useCards?<Cards choices={p.ch} onSubmit={cardSubmit} clr={clr} focus={focus}/>
          :useVoice?<Voice onSubmit={submit} clr={clr}/>
          :useTap?<TapCnt problem={p} onSubmit={submit} clr={clr}/>
          :<NumPad onSubmit={submit} clr={clr}/>
        )}

        {/* Hint */}
        {focus&&att>=2&&p.dc&&!hint&&<div style={{textAlign:"center",marginTop:14}}><button className="b" onClick={()=>setHint(true)} style={{background:"#fef9c3",color:"#92400e",padding:"6px 14px",fontSize:12,border:"1px solid #fde68a"}}>Show hint</button></div>}
        {hint&&p.dc&&<div className="fi" style={{textAlign:"center",marginTop:10,background:"#fef9c3",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,color:"#92400e",border:"1px solid #fde68a"}}>{p.dc}</div>}
      </div>
    </div>);
  }

  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
